<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preload" href="/Styles/dashboard.css" as="style">
    <link rel="stylesheet" href="/Styles/dashboard.css">
</head>
<body>
    <div class="dashboard-container">
        <div class="dash-header">
            Practice Dashboard
        </div>
        <div class="dash-navbar">
            <div class="patient-search">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M7.33333 12.6667C10.2789 12.6667 12.6667 10.2789 12.6667 7.33333C12.6667 4.38781 10.2789 2 7.33333 2C4.38781 2 2 4.38781 2 7.33333C2 10.2789 4.38781 12.6667 7.33333 12.6667Z" stroke="#2E2E2E" stroke-opacity="0.75" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M13.999 13.999L11.099 11.099" stroke="#2E2E2E" stroke-opacity="0.75" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                <input type="text" placeholder="Patient search" id="patientSearch">
            </div>
            <div class="doctor-search">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M7.33333 12.6667C10.2789 12.6667 12.6667 10.2789 12.6667 7.33333C12.6667 4.38781 10.2789 2 7.33333 2C4.38781 2 2 4.38781 2 7.33333C2 10.2789 4.38781 12.6667 7.33333 12.6667Z" stroke="#2E2E2E" stroke-opacity="0.75" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M13.999 13.999L11.099 11.099" stroke="#2E2E2E" stroke-opacity="0.75" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                <input type="text" placeholder="doctor-search" id="doctorSearch">
            </div>
            <div class="from-date-search" id="fromDate">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12.6667 2.66797H3.33333C2.59695 2.66797 2 3.26492 2 4.0013V13.3346C2 14.071 2.59695 14.668 3.33333 14.668H12.6667C13.403 14.668 14 14.071 14 13.3346V4.0013C14 3.26492 13.403 2.66797 12.6667 2.66797Z" stroke="#2E2E2E" stroke-opacity="0.5" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M10.666 1.33203V3.9987" stroke="#2E2E2E" stroke-opacity="0.5" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M5.33398 1.33203V3.9987" stroke="#2E2E2E" stroke-opacity="0.5" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M2 6.66797H14" stroke="#2E2E2E" stroke-opacity="0.5" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                <input type="date" placeholder="24/1/2023"  id="toDate">


            </div>
           
            <div class="to-date-search">
                 <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12.6667 2.66797H3.33333C2.59695 2.66797 2 3.26492 2 4.0013V13.3346C2 14.071 2.59695 14.668 3.33333 14.668H12.6667C13.403 14.668 14 14.071 14 13.3346V4.0013C14 3.26492 13.403 2.66797 12.6667 2.66797Z" stroke="#2E2E2E" stroke-opacity="0.5" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M10.666 1.33203V3.9987" stroke="#2E2E2E" stroke-opacity="0.5" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M5.33398 1.33203V3.9987" stroke="#2E2E2E" stroke-opacity="0.5" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M2 6.66797H14" stroke="#2E2E2E" stroke-opacity="0.5" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                <input type="date" placeholder="24/1/2023">
            </div>
            <div class="up-date">
            <button class="update-btn">
                Update
            </button>
            </div>

        </div>
        <div class="appointment-details">
            <div class="appointment-header">
                Appointment Details

            </div>
            <div class="table-wrapper"> 
            <div class="appointment-navbar">
                <div>Patient</div>
                <div>Doctor</div>
                <div>Hospital</div>
                <div>Speciality</div>
                <div>Select Date</div>
                <div>Select Time</div>
                <div>Action</div>

            </div>
            <div class="appointment-body" id="appointmentBody"></div>
            </div>
        </div>
        
    </div>
    <div id="toast-container">
  <div id="toast" class="toast"></div>
</div>
<script src="/Scripts/dashboard.js"></script>
</body>
</html>
